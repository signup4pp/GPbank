<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gayathri's Piggy Bank</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<div class="app">

<header class="hero">
  <div class="pig">🐷</div>
  <h1>Gayathri's Piggy Bank</h1>
  <p>Every little saving counts ❤️</p>
</header>

<section class="card balance">
  <span>Piggy Balance</span>
  <h2 id="total">₹0</h2>
</section>

<section class="card">
  <label>Deposit Date</label>
  <input type="date" id="date">

  <label>Quick Amount</label>

  <div class="quick-buttons">
    <button data-amt="50">₹50</button>
    <button data-amt="100">₹100</button>
    <button data-amt="150">₹150</button>
    <button data-amt="200">₹200</button>
    <button data-amt="250">₹250</button>
    <button data-amt="500">₹500</button>
    <button data-amt="1000">₹1000</button>
  </div>

  <label>Custom Amount</label>
  <input type="number" id="amount" placeholder="Enter amount">

  <button id="saveBtn" class="save">Save Deposit</button>
</section>

<section class="card">
  <h3>Last Deposit</h3>
  <div id="lastDeposit">No deposits yet</div>
</section>

<section class="card">
  <h3>Recent Activity</h3>
  <div id="history"></div>
</section>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbw0kzELWSOMg8MXcuqtqzATJAtQyeiib3oAOOFtEhg2G2xDk06Z22F40z4NLHVfZ0rD/exec";
</script>
<script src="app.js"></script>
</body>
</html>
